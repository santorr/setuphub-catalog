name: Catalog check

on:
  push:
    paths:
      - "packages.json"
      - "icons/**"
      - "scripts/Test-Catalog.ps1"
      - ".github/workflows/catalog-check.yml"
  pull_request:
    paths:
      - "packages.json"
      - "icons/**"
      - "scripts/Test-Catalog.ps1"
      - ".github/workflows/catalog-check.yml"
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: catalog-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate catalog and winget IDs
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect winget
        id: winget
        shell: pwsh
        run: |
          if (Get-Command winget -ErrorAction SilentlyContinue) {
            "available=true" >> $env:GITHUB_OUTPUT
            winget --version
          } else {
            "available=false" >> $env:GITHUB_OUTPUT
            Write-Warning "winget is not available on this runner; package ID checks will be skipped."
          }

      - name: Setup Python
        if: steps.winget.outputs.available == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate catalog
        shell: pwsh
        run: |
          if ("${{ steps.winget.outputs.available }}" -eq "true") {
            ./scripts/Test-Catalog.ps1
          } else {
            ./scripts/Test-Catalog.ps1 -SkipWinget
          }
