name: Catalog check

on:
  push:
    paths:
      - "packages.json"
      - "icons/**"
      - "scripts/Test-Catalog.ps1"
      - ".github/workflows/catalog-check.yml"
  pull_request:
    paths:
      - "packages.json"
      - "icons/**"
      - "scripts/Test-Catalog.ps1"
      - ".github/workflows/catalog-check.yml"
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: catalog-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate catalog and winget IDs
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show winget version
        shell: pwsh
        run: |
          if (-not (Get-Command winget -ErrorAction SilentlyContinue)) {
            throw "winget is not available on this runner. Use a Windows runner with Windows Package Manager installed."
          }

          winget --version

      - name: Validate catalog
        shell: pwsh
        run: ./scripts/Test-Catalog.ps1
